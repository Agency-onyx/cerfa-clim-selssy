services:
  - type: web
    name: cerfa-mml
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn web_app:app
    envVars:
      - key: SELLSY_CONSUMER_TOKEN
        sync: false
      - key: SELLSY_CONSUMER_SECRET
        sync: false
      - key: SELLSY_USER_TOKEN
        sync: false
      - key: SELLSY_USER_SECRET
        sync: false
